name: Generate Daily Art

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC (8 PM PT prev day) — off-peak

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('uv.lock') }}

      - uses: actions/cache@v5
        with:
          path: models/weights
          key: adain-models-v1

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Download models
        run: python models/download_models.py

      - name: Generate and upload
        run: uv run python src/main.py --source unsplash
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: bauhaus
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          STYLE_MODE: curated
          LANDSCAPES_ONLY: 'true'

      - name: Notify success
        if: success() && env.NTFY_TOPIC != ''
        continue-on-error: true
        run: |
          curl -f --max-time 10 --retry 2 --retry-delay 2 \
            -H "Title: Daily art generation succeeded" \
            -H "Priority: default" \
            -H "Tags: white_check_mark" \
            -H "Actions: view, Open Run, ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "Generate workflow completed successfully." \
            "https://ntfy.sh/$NTFY_TOPIC"
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

      - name: Notify failure
        if: failure() && env.NTFY_TOPIC != ''
        continue-on-error: true
        run: |
          curl -f --max-time 10 --retry 2 --retry-delay 2 \
            -H "Title: Daily art generation failed" \
            -H "Priority: high" \
            -H "Tags: x" \
            -H "Actions: view, Open Run, ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "Generate workflow failed. Check the run logs for details." \
            "https://ntfy.sh/$NTFY_TOPIC"
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
