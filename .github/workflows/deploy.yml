name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: '22'
  WORKER_URL: 'https://bauhaus.cascadiacollections.workers.dev'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: worker
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      - name: Deploy to Cloudflare Workers
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post-deploy health check
        run: |
          sleep 3
          STATUS=$(curl -sf --retry 2 --retry-delay 2 --max-time 10 "${{ env.WORKER_URL }}/api/today.json" | python3 -c "import sys,json; print(json.load(sys.stdin).get('license',''))" || echo "FAILED")
          if [ "$STATUS" != "CC0-1.0" ]; then
            echo "::error::Health check failed"
            exit 1
          fi
          echo "::notice::Deploy successful - API returning CC0 metadata"
