name: Sign Image Metadata

on:
  push:
    branches: [main]
    paths:
      - 'stylized/**/*.jpg'
      - 'originals/**/*.jpg'

permissions:
  contents: write

jobs:
  sign-metadata:
    name: Sign image metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gnupg libimage-exiftool-perl

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign metadata for changed images
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          chmod +x scripts/sign-image-metadata.sh
          git diff --name-only HEAD~1 HEAD -- '*.jpg' | while IFS= read -r img; do
            if [[ -f "$img" ]]; then
              echo "Signing: $img"
              bash scripts/sign-image-metadata.sh "$img"
            fi
          done

      - name: Verify signatures
        run: |
          find . -name '*.metadata.json.sig' | while IFS= read -r sig; do
            meta="${sig%.sig}"
            if [[ -f "$meta" ]]; then
              echo "Verifying: $sig"
              gpg --batch --verify "$sig" "$meta"
            fi
          done

      - name: Commit signature files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.metadata.json.sig'
          if git diff --cached --quiet; then
            echo "No new signature files to commit."
          else
            git commit -m "chore: add PGP metadata signatures [skip ci]"
            git push
          fi
